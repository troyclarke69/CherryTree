<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immersive Interactive Media Layout</title>
    <style>
        * { box-sizing: border-box; }
        
        body { 
            background: #0f172a; 
            color: #f8fafc; 
            font-family: sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden; /* Keeps screen perfectly clean and scrollbar-free */
        }

        /* 1. Immersive Auto-Scaling Container Layout 
           Locks to 16:9 aspect ratio while filling either 95% width or 95% height 
           of the browser window without crashing aspect boundaries. */
        .interactive-wrapper { 
            position: relative; 
            width: 95vw; 
            max-height: 95vh;
            aspect-ratio: 16/9; 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* 2. Media Layout Stack */
        .interactive-wrapper video, .interactive-wrapper img { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: opacity 2.2s cubic-bezier(0.25, 1, 0.5, 1); /* Slightly slower for a more majestic crossfade */
        }
        
        /* Base state for the media assets */
        .media-asset {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Controls opacity, scale transforms, and blur filters all at once */
            transition: opacity 1.2s ease-in-out, transform 1.2s ease-in-out, filter 1.2s ease-in-out;
        }

        /* --- THE VIDEO TRANSITION STATES --- */
        .media-asset.visible {
            opacity: 1;
            transform: scale(1);
            filter: blur(0px);
        }
        .video-source.hidden {
            opacity: 0;
            transform: scale(1.05); /* Slight zoom-out as it vanishes */
            filter: blur(10px);     /* Smoothly blurs out the video details */
        }

        /* --- THE IMAGE TRANSITION STATES --- */
        .image-source.hidden {
            opacity: 0;
            transform: scale(0.95); /* Starts slightly smaller */
            filter: blur(5px);
        }
        .image-source.visible {
            opacity: 1;
            transform: scale(1);    /* Smoothly glides up to full size */
            filter: blur(0px);      /* Snaps into perfect focus */
        }

        /* 3. Overlay Coordinate Mapping Engine */
        .overlay-layer { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            z-index: 10; 
        }

        .interactive-link { 
            position: absolute; 
            pointer-events: auto; 
            transform: translate(-50%, -50%); 
            padding: 10px 20px; 
            background: #fff; 
            color: #0f172a; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 14px; 
            border-radius: 6px; 
            box-shadow: 0 10px 15px rgba(0,0,0,0.3); 
            transition: transform 0.2s, background-color 0.2s; 
        }

        .interactive-link:hover { 
            background: #2563eb; 
            color: #fff; 
            transform: translate(-50%, -50%) scale(1.08); 
        }
    </style>
</head>
<body>

    <!-- The container wrapper automatically adopts maximum browser scales natively -->
    <div class="interactive-wrapper" id="canvasWrapper">
        <!-- 🚀 REMOVED 'controls' ATTRIBUTE TO HIDE BROWSER CONTROL OVERLAYS -->
        <!-- Added playsinline, autoplay, muted to force programmatic video start loops -->
        <video id="videoSource" class="media-asset video-source visible" src="/public/video/CT-1.mp4" playsinline muted autoplay></video>
        <img id="imageSource" class="media-asset image-source hidden" src="/public/images/CT-still-1.PNG" 
            width="500" height="600"
            alt="Freeze Frame">
         <div class="overlay-layer" id="overlayContainer"></div>
    </div>

<script>
const HOTSPOT_DATA = [
    { id: "link-1", text: "⏱️ Projects Link (12s - 16s)", url: "https://blender.org", startTime: 2.0, endTime: 6.0, x: 25.0, y: 35.0 },
    { id: "link-2", text: "🚀 Contact (Starts 14.5s)", url: "https://blender.org", startTime: 4.5, endTime: 999.0, x: 65.0, y: 50.0 },
    { id: "link-3", text: "🛒 Buy Me (Starts 28s)", url: "https://blender.org", startTime: 7.0, endTime: 999.0, x: 50.0, y: 75.0 }
];

class InteractiveMediaEngine {
    constructor(cId, vId, iId, oId, data) {
        this.wrapper = document.getElementById(cId);
        this.video = document.getElementById(vId);
        this.image = document.getElementById(iId);
        this.overlay = document.getElementById(oId);
        this.dataset = data;
        this.activeNodes = new Map();
        this.isStaticState = false;

        this.video.addEventListener('timeupdate', () => { if (!this.isStaticState) this.evaluateTimeline(); });
        this.video.addEventListener('ended', () => this.executeHandoff());
        
        // Recalc runs seamlessly behind the scenes when browser window modifies sizes
        window.addEventListener('resize', () => this.recalcTypography());
        
        // Call typography scaling calculations instantly on startup initialization 
        this.recalcTypography();
    }

    evaluateTimeline() {
        const t = this.video.currentTime;
        this.dataset.forEach(item => {
            const visible = t >= item.startTime && t <= item.endTime;
            if (visible && !this.activeNodes.has(item.id)) this.injectLink(item);
            else if (!visible && this.activeNodes.has(item.id)) this.purgeLink(item.id);
        });
    }

    executeHandoff() {
        this.isStaticState = true;
        this.video.classList.replace('visible', 'hidden');
        this.image.classList.replace('hidden', 'visible');

        this.activeNodes.forEach((node, id) => {
            if (this.dataset.find(d => d.id === id)?.endTime <= this.video.duration) this.purgeLink(id);
        });
        this.dataset.forEach(item => {
            if (item.endTime >= this.video.duration && !this.activeNodes.has(item.id)) this.injectLink(item);
        });
    }

    injectLink(item) {
        const link = document.createElement('a');
        link.id = item.id; link.href = item.url; link.target = '_blank';
        link.className = 'interactive-link'; link.innerText = item.text;
        link.style.left = `${item.x}%`; link.style.top = `${item.y}%`;
        this.overlay.appendChild(link);
        this.activeNodes.set(item.id, link);
        this.recalcTypography();
    }

    purgeLink(id) {
        this.activeNodes.get(id)?.remove();
        this.activeNodes.delete(id);
    }

    recalcTypography() {
        const w = this.wrapper.getBoundingClientRect().width;
        const size = Math.max(11, Math.min(22, w * 0.0165));
        this.activeNodes.forEach(node => {
            node.style.fontSize = `${size}px`;
            node.style.padding = `${size * 0.5}px ${size * 1.1}px`;
            node.style.borderRadius = `${size * 0.4}px`;
        });
    }
}

document.addEventListener('DOMContentLoaded', () => {
    new InteractiveMediaEngine('canvasWrapper', 'videoSource', 'imageSource', 'overlayContainer', HOTSPOT_DATA);
});
</script>
</body>
</html>
