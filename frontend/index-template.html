<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CherryTreeCo.</title>
    <style>
        * { box-sizing: border-box; }
        
        body { 
            /* background: #0f172a;  */
            background-image: radial-gradient(#3a4374, #13172e);
            color: #f8fafc; 
            font-family: sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }

        .interactive-wrapper { 
            position: relative; 
            width: 95vw; 
            max-height: 95vh;
            aspect-ratio: 16/9; 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
            /* box-shadow: 0 25px 50px rgba(0,0,0,0.5); */
        }

        .media-asset { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: opacity 0.3s ease-out; 
        }
        
        .media-asset.hidden { opacity: 0; pointer-events: none; }
        .media-asset.visible { opacity: 1; }

        /* THE FLASH OVERLAY LAYER */
        .flash-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            opacity: 0;
            pointer-events: none;
            z-index: 15;
        }

        .flash-active {
            animation: cameraFlash 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes cameraFlash {
            0% { opacity: 0; }
            15% { opacity: 1; }
            100% { opacity: 0; }
        }

        .overlay-layer { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
            z-index: 10; 
        }

        /* UPDATED: PREMIUM DARK THEME WITH TEXT MOTION BLUR ANIMATION */
        .interactive-link { 
            position: absolute; 
            pointer-events: auto; 
            transform: translate(-50%, -50%) scale(0.9); 
            padding: 10px 20px; 
            
            /* Dark semi-translucent background */
            background-color: rgba(46, 61, 97, 0.7); 
            /* White text styling */
            color: #9ba4da; 
            /* Blurs everything standing directly behind the button bounds */
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px); /* Safari support */
            /* border: 4px solid rgba(255, 255, 255, 0.15);  */
            
            text-decoration: none; 
            font-weight: 400; 
            font-size: 8px; 
            border-radius: 4px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5); 
            white-space: nowrap;
            
            /* Entry starting states: Completely invisible and heavily blurred */
            opacity: 0; 
            filter: blur(22px); 
            
            /* Smooth transitions handling both entry pop and mouse hover animations */
            transition: 
                opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), 
                filter 0.6s cubic-bezier(0.16, 1, 0.3, 1), 
                transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), 
                background-color 0.2s, 
                border-color 0.2s; 
        }

        /* 🚀 INCOMING LINK ACTIVE VIEW STATE */
        .interactive-link.loaded {
            opacity: 1;
            filter: blur(0px); /* Text becomes crystal clear instantly */
            transform: translate(-50%, -50%) scale(1); 
        }

        /* Hover animation state matching dark parameters */
        .interactive-link.loaded:hover { 
            background-color: rgba(37, 99, 235, 0.85); /* Electric blue hover focus */
            border-color: rgba(255, 255, 255, 0.4);
            transform: translate(-50%, -50%) scale(1.05); 
        }
    </style>
</head>
<body>

    <div class="interactive-wrapper" id="canvasWrapper">
        <video id="videoSource" class="media-asset visible" src="./public/video/CT-1.mp4" playsinline muted autoplay></video>
        <img id="imageSource" class="media-asset hidden" src="./public/images/dark-blue.png" alt="Freeze Frame Background">
        <div id="flashOverlay" class="flash-layer"></div>
        <div class="overlay-layer" id="overlayContainer"></div>
    </div>

<script>
const HOTSPOT_DATA = [
    { id: "link-1", text: "Begin the experience", url: "/", startTime: 9.0, endTime: 15.0, x: 20.0, y: 20.0 },
    { id: "link-2", text: "See our work", url: "/", startTime: 16.5, endTime: 26.0, x: 65.0, y: 70.0 },
    { id: "link-3", text: "Enter CherryTree", url: "/", startTime: 33.0, endTime: 999.0, x: 80.0, y: 20.0 }
];

class InteractiveMediaEngine {
    constructor(cId, vId, iId, oId, fId, data) {
        this.wrapper = document.getElementById(cId);
        this.video = document.getElementById(vId);
        this.image = document.getElementById(iId);
        this.overlay = document.getElementById(oId);
        this.flash = document.getElementById(fId);
        this.dataset = data;
        this.activeNodes = new Map();
        this.isStaticState = false;

        this.video.addEventListener('timeupdate', () => { if (!this.isStaticState) this.evaluateTimeline(); });
        this.video.addEventListener('ended', () => this.executeHandoff());
        
        window.addEventListener('resize', () => this.recalcTypography());
        this.recalcTypography();
    }

    evaluateTimeline() {
        const t = this.video.currentTime;
        this.dataset.forEach(item => {
            const visible = t >= item.startTime && t <= item.endTime;
            if (visible && !this.activeNodes.has(item.id)) this.injectLink(item);
            else if (!visible && this.activeNodes.has(item.id)) this.purgeLink(item.id);
        });
    }

    executeHandoff() {
        this.isStaticState = true;
        this.flash.classList.add('flash-active');

        setTimeout(() => {
            this.video.classList.replace('visible', 'hidden');
            this.image.classList.replace('hidden', 'visible');
            this.activeNodes.forEach((node, id) => {
                if (this.dataset.find(d => d.id === id)?.endTime <= this.video.duration) this.purgeLink(id);
            });
        }, 100);

        setTimeout(() => {
            this.dataset.forEach(item => {
                if (item.endTime >= this.video.duration && !this.activeNodes.has(item.id)) {
                    this.injectLink(item);
                }
            });

            this.activeNodes.forEach(node => {
                requestAnimationFrame(() => {
                    node.classList.add('loaded');
                });
            });
        }, 600);
    }

    injectLink(item) {
        const link = document.createElement('a');
        link.id = item.id; link.href = item.url; link.target = '_blank';
        link.className = 'interactive-link'; link.innerText = item.text;
        link.style.left = `${item.x}%`; link.style.top = `${item.y}%`;
        
        if (this.isStaticState) {
            link.classList.remove('loaded');
        } else {
            link.classList.add('loaded');
        }

        this.overlay.appendChild(link);
        this.activeNodes.set(item.id, link);
        this.recalcTypography();
    }

    purgeLink(id) {
        this.activeNodes.get(id)?.remove();
        this.activeNodes.delete(id);
    }

    recalcTypography() {
        const w = this.wrapper.getBoundingClientRect().width;
        const size = Math.max(11, Math.min(22, w * 0.0165));
        this.activeNodes.forEach(node => {
            node.style.fontSize = `${size}px`;
            node.style.padding = `${size * 0.5}px ${size * 1.1}px`;
            node.style.borderRadius = `${size * 0.4}px`;
        });
    }
}

document.addEventListener('DOMContentLoaded', () => {
    new InteractiveMediaEngine('canvasWrapper', 'videoSource', 'imageSource', 'overlayContainer', 'flashOverlay', HOTSPOT_DATA);
});
</script>
</body>
</html>
